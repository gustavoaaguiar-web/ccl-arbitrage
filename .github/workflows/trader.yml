  # Permite disparar manualmente desde la UI de GitHub
  workflow_dispatch:
    inputs:
      ciclos:
        description: 'Cantidad de ciclos (default: 5)'
        required: false
        default: '5'

# Un solo run a la vez. Si llega uno nuevo mientras hay otro en curso,
# espera en cola (cancel-in-progress: false) en vez de pisarlo.
concurrency:
  group: trader-job
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 8   # cada ejecuciÃ³n dura mÃ¡x 5 min (5 ciclos Ã— 60s)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install \
            requests \
            numpy \
            hmmlearn \
            gspread \
            google-auth \
            pytz

      - name: Run trader job
        env:
          IOL_USER:            ${{ secrets.IOL_USER }}
          IOL_PASS:            ${{ secrets.IOL_PASS }}
          ALPACA_KEY:          ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET:       ${{ secrets.ALPACA_SECRET }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:      ${{ secrets.GMAIL_APP_PASS }}
        run: |
          CICLOS=${{ github.event.inputs.ciclos || '5' }}
          python trader_job.py --ciclos $CICLOS
