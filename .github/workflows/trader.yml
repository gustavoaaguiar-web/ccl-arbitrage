name: GG HMM-CCL Trader

on:
  schedule:
    # Cron en UTC. Argentina es UTC-3 (todo el año, sin DST).
    # 10:25 ART = 13:25 UTC  →  primer disparo antes de apertura
    # 17:05 ART = 20:05 UTC  →  último disparo después de cierre forzado
    # Cada 5 minutos entre esos horarios, lunes a viernes.

    # ── 13 UTC (10:00–10:55 ART) ──────────────────────────
    - cron: '25 13 * * 1-5'   # 10:25 ART
    - cron: '30 13 * * 1-5'   # 10:30 ART — apertura
    - cron: '35 13 * * 1-5'
    - cron: '40 13 * * 1-5'
    - cron: '45 13 * * 1-5'
    - cron: '50 13 * * 1-5'
    - cron: '55 13 * * 1-5'

    # ── 14 UTC (11:00–11:55 ART) ──────────────────────────
    - cron: '0 14 * * 1-5'
    - cron: '5 14 * * 1-5'
    - cron: '10 14 * * 1-5'
    - cron: '15 14 * * 1-5'
    - cron: '20 14 * * 1-5'
    - cron: '25 14 * * 1-5'
    - cron: '30 14 * * 1-5'
    - cron: '35 14 * * 1-5'
    - cron: '40 14 * * 1-5'
    - cron: '45 14 * * 1-5'
    - cron: '50 14 * * 1-5'
    - cron: '55 14 * * 1-5'

    # ── 15 UTC (12:00–12:55 ART) ──────────────────────────
    - cron: '0 15 * * 1-5'
    - cron: '5 15 * * 1-5'
    - cron: '10 15 * * 1-5'
    - cron: '15 15 * * 1-5'
    - cron: '20 15 * * 1-5'
    - cron: '25 15 * * 1-5'
    - cron: '30 15 * * 1-5'
    - cron: '35 15 * * 1-5'
    - cron: '40 15 * * 1-5'
    - cron: '45 15 * * 1-5'
    - cron: '50 15 * * 1-5'
    - cron: '55 15 * * 1-5'

    # ── 16 UTC (13:00–13:55 ART) ──────────────────────────
    - cron: '0 16 * * 1-5'
    - cron: '5 16 * * 1-5'
    - cron: '10 16 * * 1-5'
    - cron: '15 16 * * 1-5'
    - cron: '20 16 * * 1-5'
    - cron: '25 16 * * 1-5'
    - cron: '30 16 * * 1-5'
    - cron: '35 16 * * 1-5'
    - cron: '40 16 * * 1-5'
    - cron: '45 16 * * 1-5'
    - cron: '50 16 * * 1-5'
    - cron: '55 16 * * 1-5'

    # ── 17 UTC (14:00–14:55 ART) ──────────────────────────
    - cron: '0 17 * * 1-5'
    - cron: '5 17 * * 1-5'
    - cron: '10 17 * * 1-5'
    - cron: '15 17 * * 1-5'
    - cron: '20 17 * * 1-5'
    - cron: '25 17 * * 1-5'
    - cron: '30 17 * * 1-5'
    - cron: '35 17 * * 1-5'
    - cron: '40 17 * * 1-5'
    - cron: '45 17 * * 1-5'
    - cron: '50 17 * * 1-5'
    - cron: '55 17 * * 1-5'

    # ── 18 UTC (15:00–15:55 ART) ──────────────────────────
    - cron: '0 18 * * 1-5'
    - cron: '5 18 * * 1-5'
    - cron: '10 18 * * 1-5'
    - cron: '15 18 * * 1-5'
    - cron: '20 18 * * 1-5'
    - cron: '25 18 * * 1-5'
    - cron: '30 18 * * 1-5'
    - cron: '35 18 * * 1-5'
    - cron: '40 18 * * 1-5'
    - cron: '45 18 * * 1-5'
    - cron: '50 18 * * 1-5'
    - cron: '55 18 * * 1-5'

    # ── 19 UTC (16:00–16:55 ART) ──────────────────────────
    - cron: '0 19 * * 1-5'
    - cron: '5 19 * * 1-5'
    - cron: '10 19 * * 1-5'
    - cron: '15 19 * * 1-5'
    - cron: '20 19 * * 1-5'
    - cron: '25 19 * * 1-5'
    - cron: '30 19 * * 1-5'   # 16:30 ART — stop compra
    - cron: '35 19 * * 1-5'
    - cron: '40 19 * * 1-5'
    - cron: '45 19 * * 1-5'
    - cron: '50 19 * * 1-5'   # 16:50 ART — cierre forzado
    - cron: '55 19 * * 1-5'

    # ── 20 UTC (17:00–17:05 ART) ──────────────────────────
    - cron: '0 20 * * 1-5'
    - cron: '5 20 * * 1-5'    # 17:05 ART — último disparo

  # Permite disparar manualmente desde la UI de GitHub
  workflow_dispatch:
    inputs:
      ciclos:
        description: 'Cantidad de ciclos (default: 5)'
        required: false
        default: '5'

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 8   # cada ejecución dura máx 5 min (5 ciclos × 60s)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install \
            requests \
            numpy \
            hmmlearn \
            gspread \
            google-auth \
            pytz

      - name: Run trader job
        env:
          IOL_USER:            ${{ secrets.IOL_USER }}
          IOL_PASS:            ${{ secrets.IOL_PASS }}
          ALPACA_KEY:          ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET:       ${{ secrets.ALPACA_SECRET }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:      ${{ secrets.GMAIL_APP_PASS }}
        run: |
          CICLOS=${{ github.event.inputs.ciclos || '5' }}
          python trader_job.py --ciclos $CICLOS
